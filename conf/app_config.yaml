logging:
  file:
    enable: true
    level: INFO
    path: logs
    rotation: "10 MB"
    retention: "7 days"
  console:
    enable: true
    level: INFO

db_meta:
  host: ${oc.env:DB_HOST,127.0.0.1}
  port: ${oc.env:DB_PORT,3306}
  user: ${oc.env:DB_USER,root}
  password: ${oc.env:DB_PASSWORD,""}
  database: meta

db_dw:
  host: ${oc.env:DB_HOST,127.0.0.1}
  port: ${oc.env:DB_PORT,3306}
  user: ${oc.env:DB_USER,root}
  password: ${oc.env:DB_PASSWORD,""}
  database: ${oc.env:DB_NAME,finance}

qdrant:
  host: ${oc.env:QDRANT_HOST,127.0.0.1}
  port: ${oc.env:QDRANT_PORT,6333}
  embedding_size: 1024

embedding:
  host: ${oc.env:TEI_HOST,127.0.0.1}
  port: ${oc.env:TEI_PORT,8081}
  model: BAAI/bge-large-zh-v1.5

es:
  host: ${oc.env:ES_HOST,127.0.0.1}
  port: ${oc.env:ES_PORT,9200}
  index_name: finance_agent

llm:
  model_name: deepseek-chat
  api_key: ${oc.env:DEEPSEEK_API_KEY,""}
